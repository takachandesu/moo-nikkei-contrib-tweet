name: Post Nikkei Contribution to X

on:
  schedule:
    # JST 9:00 - 16:30 を 30分おき (= UTC 0:00 - 7:30) 平日のみ
    # FTPは使わないので state-name 衝突対策は不要
    - cron: '0,30 0-7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Post to X
        env:
          X_API_KEY:        ${{ secrets.X_API_KEY }}
          X_API_SECRET:     ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:   ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:  ${{ secrets.X_ACCESS_SECRET }}
        run: python scripts/post_nikkei_contrib_to_x.py

      - name: Commit state if changed
        run: |
          if [ -n "$(git status --porcelain data/last_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/last_state.json
            git commit -m "chore: update last_state.json [skip ci]"
            git push
          else
            echo "state unchanged - skipping commit"
          fi
